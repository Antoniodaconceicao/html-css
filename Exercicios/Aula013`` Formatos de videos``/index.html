<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este video está hospedado no meu proprio servidor.</p>

    <video src="media/limao03.mp4" width="500px" controls></video> <!--(Forma simple)-Não adianta fazer da forma simples-->

    <video width="500px" poster="imagens/limoes-capa.png" controls>

        <source src="media/videodolimao02.mp4" type="videolimao02.mp4">

    </video>
    

    <h1>inserindo videos do youtube</h1>
