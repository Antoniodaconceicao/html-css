<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Caixas</title>
    <style>
        h1{ /*Box level*/
            background-color: lightblue;
            height: 300px;
            width: 300px;

            border: 10px solid darkgray;

            padding: 10px;
            
            margin: 10px auto 50px auto ;

        
           outline: 10px dashed red;
        }

        a{ /*Inline-level*/
            border: 10px solid red;
        
            padding: 10px;
        }

    </style>
</head>
<body>
    <h1>Exemplo de caixa box level</h1>
    <p>Paragrafo também são exemplos box level, mas os <a href="#"> links são exemplos de caixas inline-level</a>.Vamos ver como tudo isso funciona</p>
    
</body>
</html>
