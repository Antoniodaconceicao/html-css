<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em html5</title>
</head>
<body>
    <h1>Imagem Dinâmica</h1>
    <p>Tenta abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu dispositivos</p>

    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="foto g">
    </picture>

    <H1>Reproduzindo áudio</H1> <!--Maneira limitada-->
    <p>Vamos aprender a reproduzir áudios em html5</p>
    <audio src="media/(I've Got A) Baby Sister - Reed Mathis.mp3" controls autoplay></audio> <!--MP3, WAV,OGG-->
    
    <audio preload="metadata" autoplay controls>
        <source src="media/(I've Got A) Baby Sister - Reed Mathis.mp3" type="audio/mpeg">
        <source src="media/guanacast-33.ogg" type="audio/ogg">
        <source src="media/(Look Out) She's America - Otis McDonald.wav" type="audio/wav">
        <p>Infelizmente o seu navegador não consegue reproduzir áudio <a href="media/(I've Got A) Baby Sister - Reed Mathis.mp3"> Clique aqui para baixar o arquivo MP3</a></p>
    </audio>


    
</body>
</html>
